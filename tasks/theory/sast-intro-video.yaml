    ## Что такое SAST

    **Static Application Security Testing (SAST)** — метод анализа исходного кода, байт-кода
    или бинарников приложения **без его запуска**. SAST-инструменты ищут паттерны
    уязвимостей (SQLi, XSS, hardcoded-секреты, небезопасную криптографию и т.д.)
    прямо в коде на ранних стадиях SDLC.

    ### Ключевые особенности

    - **White-box** — у сканера есть доступ к исходному коду.
    - **Shift-left** — запускается рано: в IDE, на pre-commit или в PR-пайплайне,
      чтобы ловить баги до деплоя.
    - **Нет runtime-зависимости** — приложение не нужно запускать, не нужны
      тестовые данные, не нужна инфраструктура.
    - **High signal, но и high noise** — без настройки правил и baseline'а
      SAST выдаёт много false-positive'ов; работа с шумом — отдельный навык.

    ### Где в пайплайне

    ```
    Developer → IDE plugin → pre-commit hook → CI (PR scan) → Security gate → Merge
                  ↑ SAST          ↑ SAST              ↑ SAST
    ```

    ### Что посмотреть после видео

    В следующих уроках этого модуля вы разберёте:
    1. Основы обнаружения секретов (Gitleaks, TruffleHog, detect-secrets).
    2. Semgrep — кастомные правила и taint-анализ.
    3. Встраивание SAST в CI/CD с policy-gates и SARIF-отчётами.

