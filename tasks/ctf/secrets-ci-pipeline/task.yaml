title: "Lab 7: Secrets Scanning в CI/CD Pipeline"
description: |
  В `/lab/repo` есть Gitea-репозиторий с Gitea Actions runner.
  Файл `.gitea/workflows/ci.yml` пуст. Твоя задача:

  1. Добавь job для secrets scanning с `gitleaks`
  2. Pipeline должен ПРОХОДИТЬ на чистом коде
  3. Pipeline должен БЛОКИРОВАТЬ коммит с секретом

  Gitea доступен по: `http://localhost:3000`
  Логин: `student` / Password: `lab_password`

  Когда pipeline настроен корректно — `/lab/check.sh` выдаст флаг.

  Структура `.gitea/workflows/ci.yml`:
  ```yaml
    name: Security Scan
    on: [push]
    jobs:
      secrets-scan:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Run Gitleaks
            ...
  ```

  Подсказки:
  - `gitleaks/gitleaks-action@v2`
  - `exit-code` настройка в Gitleaks
