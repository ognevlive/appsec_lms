title: "Lab 18: Trivy — комплексное сканирование"
description: |
  Контейнер содержит несколько целей для сканирования:
  - Docker образ `lms/java-legacy` (с Log4j 2.14)
  - Директория `/lab/infra/` с Terraform конфигами
  - Директория `/lab/app/` с Python проектом

  Задача — освоить разные режимы `trivy`:

  1. Сканирование образа:
       `trivy image lms/java-legacy`
     Найди CVE с CRITICAL severity (подсказка: Log4Shell)

  2. Сканирование IaC:
       `trivy config /lab/infra/`
     Найди мисконфигурацию в S3 bucket конфиге

  3. Сканирование файловой системы:
       `trivy fs /lab/app/`
     Найди HIGH vulnerability в зависимостях

  Запусти `/lab/check.sh <cve_id>` для получения флага.

  Подсказки:
  - `trivy image --severity CRITICAL lms/java-legacy`
  - `trivy config --format json /lab/infra/ | jq '.Results[].Misconfigurations'`
