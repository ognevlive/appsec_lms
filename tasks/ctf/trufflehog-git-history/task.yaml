title: "Lab 4: Trufflehog — сканирование git history"
description: |
  Репозиторий `/lab/repo` имеет 30+ коммитов. Slack Bot Token был добавлен
  в коде, затем удалён в следующем коммите — и `gitleaks` его НЕ найдёт
  если использовать стандартный режим.

  Используй `trufflehog` для глубокого сканирования истории:
    `trufflehog git file:///lab/repo --only-verified`

  Запусти также `gitleaks` и сравни результаты.

  Флаг = Slack Bot Token (`xoxb-...`) найденный Trufflehog в истории.

  Запусти `/lab/check.sh <токен>` для верификации.

  Подсказки:
  - `trufflehog git file:///lab/repo`
  - `trufflehog git file:///lab/repo --only-verified`
  - Изучи разницу между режимами `--only-verified` и без него
type: ssh_lab
order: 43
