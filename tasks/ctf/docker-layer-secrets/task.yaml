title: "Lab 2: Секреты в слоях Docker-образа"
description: |
  Docker-образ был собран с секретом, который "удалили" в последующем слое.
  Но в Docker каждый слой сохраняется навсегда.

  Внутри контейнера доступны:
  - `docker` CLI (docker socket подключён)
  - утилита `dive`
  - образ `lms/secret-layered` для исследования

  Найди пароль, который был скопирован в образ, а затем удалён командой `RUN rm`.

  Флаг = найденный пароль в формате строки.

  Подсказки:
  - `docker history lms/secret-layered`
  - `docker save lms/secret-layered | tar -xf - && tar -xf <layer>.tar`
  - `dive lms/secret-layered`
type: ssh_lab
