title: "Lab 1: Найди секреты вручную — Git history"
description: |
  Контейнер содержит Flask-приложение с историей git.
  Разработчик добавил секреты в код, а затем "удалил" их в следующем коммите.

  Используй `git log`, `git show`, `git diff` и `grep` чтобы найти:
  1. API ключ, закоммиченный в файл `config.py`
  2. Пароль БД, закоммиченный в `.env` файл

  Флаг = значение API ключа, найденного в истории git.

  Подсказки:
  - `git log --all --oneline`
  - `git show <commit_hash>`
  - `git log --all -p | grep -i "api_key\|password\|secret"`
