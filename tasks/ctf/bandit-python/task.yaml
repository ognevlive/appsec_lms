title: "Lab 15: Bandit — SAST для Python"
description: |
  Python-приложение `/lab/app/` содержит несколько типичных проблем:
  - `pickle.loads()` с непроверенными данными (B301)
  - `subprocess.Popen` с `shell=True` (B602)
  - Hardcoded пароль в коде (B106)
  - MD5 для хеширования паролей (B324)
  - `assert` для проверок безопасности (B101)

  Задача:
  1. Запусти `bandit -r /lab/app/` — изучи вывод
  2. Создай `/lab/bandit.yaml` с конфигурацией:
     - Исключи тесты и миграции из сканирования
     - Фокусируйся только на HIGH severity + HIGH confidence
  3. Финальный запуск: `bandit -r /lab/app/ -c /lab/bandit.yaml`
     должен показывать только реальные HIGH+HIGH проблемы (их 3)

  `/lab/check.sh` верифицирует конфигурацию и выдаст флаг.

  Подсказки:
  - `bandit -r /lab/app/ -ll`  (только HIGH severity)
  - `bandit --help | grep confidence`
  - Формат `bandit.yaml`: https://bandit.readthedocs.io/en/latest/config.html
