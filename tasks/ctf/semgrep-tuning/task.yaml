title: "Lab 11: Semgrep — снижение шума"
description: |
  Приложение в `/lab/noisy-app/` при запуске `semgrep --config=auto`
  генерирует 50+ findings, большинство из которых — false positives.

  Задача: снизить до ≤ 5 реальных, значимых findings.

  Способы:
  1. Создай `/lab/noisy-app/.semgrepignore` — исключи тесты, вендор-код
  2. Используй `--severity ERROR` чтобы фокусироваться на критичном
  3. Создай `/lab/noisy-app/semgrep.yaml` с правилами исключений

  Когда достигнешь ≤ 5 findings при запуске:
    `semgrep --config=auto /lab/noisy-app/ 2>&1 | tail -5`

  Запусти `/lab/check.sh` для получения флага.

  Подсказки:
  - `semgrep --config=auto --severity ERROR`
  - `echo "tests/" >> .semgrepignore`
  - `semgrep --help | grep severity`
