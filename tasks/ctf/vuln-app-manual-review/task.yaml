title: "Lab 9: Manual Code Review — найди 4 уязвимости"
description: |
  Flask-приложение `/lab/app` доступно по `http://localhost:5000`
  Исходный код доступен в `/lab/app/`

  Приложение содержит 4 уязвимости разных классов.
  Найди их через ручной code review (без инструментов):

  1. SQL Injection — в каком endpoint и параметре?
  2. Stored XSS — где пользовательский ввод попадает в HTML без экранирования?
  3. Path Traversal — какой endpoint позволяет читать произвольные файлы?
  4. SSRF — где сервер делает запрос по URL из user input?

  Когда найдёшь все 4 — запусти:
    `/lab/check.sh sqli xss traversal ssrf`

  Подсказки:
  - Читай код, не сканируй инструментами
  - Ищи: `request.args`, `request.form`, `cursor.execute`, `render_template_string`
  - Проверь все файлы: `ls /lab/app/`
