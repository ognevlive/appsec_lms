title: "Lab 19: Сравнение инструментов dependency scanning"
description: |
  В `/lab/` есть два проекта:
  - `/lab/python-app/` — Flask приложение с `requirements.txt`
  - `/lab/node-app/` — Express приложение с `package.json`

  Запусти три инструмента против обоих проектов:
  1. `pip-audit /lab/python-app/`
  2. `npm audit --prefix /lab/node-app/`
  3. `dependency-check.sh --project lab --scan /lab/`

  Сравни результаты. В `/lab/node-app/` есть уязвимость старого
  `lodash` (XSS, CVE-2019-10744), которую находит ТОЛЬКО
  OWASP Dependency-Check, но не `npm audit`.

  Запусти `/lab/check.sh <cve_id>` для получения флага.

  Подсказки:
  - `pip-audit --help`
  - `npm audit --json`
  - `dependency-check.sh --help`
  - `jq '.dependencies[] | select(.vulnerabilities != null)' dependency-check-report.json`
