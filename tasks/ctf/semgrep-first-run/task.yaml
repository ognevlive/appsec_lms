title: "Lab 10: Semgrep — первый запуск и триаж"
description: |
  То же приложение что в Lab 9, исходный код в `/lab/app/`.
  Теперь используй `semgrep` для автоматического поиска.

  1. Запусти: `semgrep --config=auto /lab/app/`
  2. Изучи вывод — сколько findings?
  3. Сравни с тем что нашёл руками в Lab 9
  4. Определи: какие из findings — true positives, какие — false positives?

  Флаг генерируется когда ты правильно ответишь на вопросы `/lab/quiz.sh`:
  - Сколько реальных уязвимостей нашёл Semgrep?
  - Какую из 4 уязвимостей Semgrep пропустил?

  Подсказки:
  - `semgrep --config=auto /lab/app/ --json | jq '.results | length'`
  - `semgrep --config=p/python /lab/app/`
  - `semgrep --config=p/flask /lab/app/`
type: ssh_lab
