title: "CSRF: Перевод средств"
description: |
  Банковское веб-приложение не защищено от CSRF-атак.
  Вы авторизованы как обычный пользователь.
  Создайте вредоносную HTML-страницу, которая при открытии
  администратором выполнит перевод средств на ваш счёт.

  Отправьте URL вашей страницы через форму — бот-администратор
  откроет её автоматически. Если перевод выполнен успешно,
  вы получите флаг.
type: ctf
order: 23
