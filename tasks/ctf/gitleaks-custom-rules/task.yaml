title: "Lab 6: Gitleaks — кастомные правила"
description: |
  Компания использует внутренние токены двух форматов:
  - `MYAPP-[A-Z0-9]{32}`  (application tokens)
  - `DBCONN-[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}`  (DB connection IDs)

  Репозиторий `/lab/repo` содержит такие токены — дефолтные правила
  `gitleaks` их не находят. Создай кастомный конфиг `/lab/.gitleaks.toml`:

  ```
  [[rules]]
  id = "myapp-token"
  description = "MyApp Application Token"
  regex = '''MYAPP-[A-Z0-9]{32}'''
  ...
  ```

  Запусти: `gitleaks detect --source /lab/repo --config /lab/.gitleaks.toml`

  Когда найдёшь все кастомные токены (их 3), запусти `/lab/check.sh`

  Подсказки:
  - `gitleaks --help`
  - Документация: https://github.com/gitleaks/gitleaks#configuration
  - `cat /lab/repo/src/config.py`  (для понимания контекста)
