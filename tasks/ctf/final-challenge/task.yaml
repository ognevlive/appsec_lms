title: "ФИНАЛЬНЫЙ ЧЕЛЛЕНДЖ: Production Monorepo Audit"
description: |
  Production-like монорепозиторий `/lab/monorepo/` — реальная кодовая база
  с четырьмя категориями проблем. Используй любые инструменты по выбору.

  ──────────────────────────────────────────────
  ФЛАГ 1 — Secrets: Найди API токен в git history
  (он был закоммичен 15 коммитов назад и "удалён")
  Команда: `/lab/submit_flag1.sh <токен>`

  ФЛАГ 2 — SAST: SQL injection через 3 слоя функций
  Найди файл и строку входной точки уязвимости
  Команда: `/lab/submit_flag2.sh <файл>:<строка>`

  ФЛАГ 3 — Supply Chain: Уязвимая зависимость с публичным exploit
  CVSS ≥ 9.0, есть PoC в Metasploit
  Команда: `/lab/submit_flag3.sh <CVE-ID>`

  ФЛАГ 4 — IaC: Критическая мисконфигурация Dockerfile
  (запуск от `root` + exposed secrets в `ENV`)
  Команда: `/lab/submit_flag4.sh <строка_в_dockerfile>`
  ──────────────────────────────────────────────

  Засчитывается частичный результат: каждый флаг независим.
  Рекомендуемый порядок: Secrets → Supply Chain → SAST → IaC

  Удачи!
