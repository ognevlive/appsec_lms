title: "Lab 21: Полный DevSecOps Pipeline"
description: |
  В `/lab/repo` — монорепозиторий с двумя сервисами (Python + Node.js).
  `.gitea/workflows/` пуст. Твоя задача — собрать полный pipeline:

  1. `secrets-scan` job: `gitleaks` сканирует все коммиты
  2. `sast` job: `semgrep` с кастомными правилами из `.semgrep/`
  3. `deps` job: `trivy` + `pip-audit` для Python, `npm audit` для Node.js
  4. Единая политика: pipeline блокирует при ЛЮБОМ нарушении

  Тест: в репозитории ветка `bad-commit` содержит:
  - Hardcoded GitHub token
  - SQL injection в Python сервисе
  - Уязвимую зависимость CVSS 9.0

  Pipeline ДОЛЖЕН блокировать `bad-commit` и ПРОХОДИТЬ на `main`.

  `/lab/check.sh` верифицирует поведение обеих веток.

  Подсказки:
  - Используй `needs:` для зависимостей между jobs
  - Gitea: `http://localhost:3000` (`student` / `lab_password`)
  - Изучи существующие workflows в `/lab/examples/`
type: ssh_lab
