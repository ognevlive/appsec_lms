title: "SQL Injection: Основы"
description: |
  Тест на знание основ SQL-инъекций.
  Проверяет понимание типов инъекций, методов защиты и их применения.
type: quiz
order: 1
config:
  difficulty: low
  tags: [sqli, web, owasp-top-10]
  max_points: 100
  questions:
    - id: 1
      text: "Какой тип SQL-инъекции позволяет извлечь данные через `UNION`?"
      options:
        - "Error-based"
        - "UNION-based"
        - "Blind boolean-based"
        - "Time-based blind"
      correct_answer: "UNION-based"

    - id: 2
      text: "Какой наиболее надёжный способ защиты от SQL-инъекций?"
      options:
        - "Экранирование спецсимволов"
        - "Валидация входных данных"
        - "Параметризованные запросы (Prepared Statements)"
        - "WAF (Web Application Firewall)"
      correct_answer: "Параметризованные запросы (Prepared Statements)"

    - id: 3
      text: "Что делает оператор `' OR 1=1 --` в контексте SQL-инъекции?"
      options:
        - "Удаляет все данные из таблицы"
        - "Обходит проверку аутентификации, делая условие всегда истинным"
        - "Создаёт нового пользователя"
        - "Показывает версию базы данных"
      correct_answer: "Обходит проверку аутентификации, делая условие всегда истинным"
