title: "Cross-Site Scripting: Основы"
description: |
  Тест на знание основ межсайтового скриптинга (XSS).
  Проверяет понимание типов XSS-атак, методов защиты и ключевых различий с другими уязвимостями.
type: quiz
order: 4
config:
  difficulty: low
  tags: [xss, web, owasp-top-10]
  max_points: 100
  questions:
    - id: 1
      text: "Какой тип XSS-атаки сохраняет вредоносный скрипт на сервере и выполняется у всех пользователей, просматривающих заражённую страницу?"
      options:
        - "Reflected XSS"
        - "Stored XSS"
        - "DOM-based XSS"
        - "Self-XSS"
      correct_answer: "Stored XSS"

    - id: 2
      text: "Какой HTTP-заголовок позволяет ограничить источники загрузки скриптов на странице для защиты от XSS?"
      options:
        - "`X-Frame-Options`"
        - "`Content-Security-Policy`"
        - "`Strict-Transport-Security`"
        - "`X-Content-Type-Options`"
      correct_answer: "`Content-Security-Policy`"

    - id: 3
      text: "Каким образом злоумышленник может украсть cookie пользователя через XSS-уязвимость?"
      options:
        - "Выполнив SQL-запрос к базе данных через JavaScript"
        - "Внедрив скрипт, который отправляет `document.cookie` на подконтрольный сервер"
        - "Изменив DNS-записи домена"
        - "Перехватив TLS-соединение между клиентом и сервером"
      correct_answer: "Внедрив скрипт, который отправляет `document.cookie` на подконтрольный сервер"

    - id: 4
      text: "Чем XSS принципиально отличается от CSRF?"
      options:
        - "XSS выполняет код в браузере жертвы, а CSRF заставляет браузер жертвы отправить нежелательный запрос"
        - "XSS работает только на стороне сервера, а CSRF — на стороне клиента"
        - "XSS атакует базу данных, а CSRF — файловую систему"
        - "Между ними нет различий, это синонимы"
      correct_answer: "XSS выполняет код в браузере жертвы, а CSRF заставляет браузер жертвы отправить нежелательный запрос"

    - id: 5
      text: "Какой основной метод защиты от XSS при выводе пользовательских данных на страницу?"
      options:
        - "Шифрование данных с помощью AES-256"
        - "Кодирование выходных данных (Output Encoding) в зависимости от контекста вставки"
        - "Использование протокола HTTP/2"
        - "Ограничение длины пользовательского ввода до 50 символов"
      correct_answer: "Кодирование выходных данных (Output Encoding) в зависимости от контекста вставки"
