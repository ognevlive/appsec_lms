title: "Принципы безопасной разработки"
description: |
  Тест на знание ключевых принципов безопасного написания кода.
  Проверяет понимание валидации данных, принципа наименьших привилегий, эшелонированной защиты и безопасной обработки ошибок.
type: quiz
order: 10
config:
  difficulty: medium
  tags: [secure-coding, appsec, best-practices]
  max_points: 150
  questions:
    - id: 1
      text: "В чём ключевое различие между валидацией входных данных (input validation) и кодированием выходных данных (output encoding)?"
      options:
        - "Валидация проверяет данные при получении, а кодирование преобразует их при выводе в конкретный контекст"
        - "Это одно и то же, просто разные названия"
        - "Валидация применяется только к числам, а кодирование — только к строкам"
        - "Валидация выполняется на клиенте, а кодирование — только на сервере"
      correct_answer: "Валидация проверяет данные при получении, а кодирование преобразует их при выводе в конкретный контекст"

    - id: 2
      text: "Что означает принцип наименьших привилегий (Principle of Least Privilege)?"
      options:
        - "Приложение должно запускаться только от имени `root`-пользователя"
        - "Каждый компонент системы должен иметь только минимально необходимые права для выполнения своей задачи"
        - "Все пользователи должны использовать одну общую учётную запись"
        - "Привилегии должны назначаться раз в год и не меняться"
      correct_answer: "Каждый компонент системы должен иметь только минимально необходимые права для выполнения своей задачи"

    - id: 3
      text: "Что означает принцип «эшелонированная защита» (Defense in Depth)?"
      options:
        - "Достаточно одного надёжного механизма защиты, если он правильно настроен"
        - "Применение нескольких уровней защиты, чтобы компрометация одного не приводила к полному взлому"
        - "Шифрование всех данных с использованием максимально длинных ключей"
        - "Использование только закрытого исходного кода для обеспечения безопасности"
      correct_answer: "Применение нескольких уровней защиты, чтобы компрометация одного не приводила к полному взлому"

    - id: 4
      text: "Почему важно не возвращать пользователю полные стек-трейсы и внутренние ошибки в production?"
      options:
        - "Стек-трейсы замедляют работу приложения"
        - "Они раскрывают внутреннюю структуру приложения, версии библиотек и пути файлов, что помогает злоумышленнику"
        - "Стек-трейсы занимают слишком много места в логах"
        - "Современные браузеры не умеют отображать стек-трейсы"
      correct_answer: "Они раскрывают внутреннюю структуру приложения, версии библиотек и пути файлов, что помогает злоумышленнику"

    - id: 5
      text: "Почему параметризованные запросы (Prepared Statements) безопаснее конкатенации строк при формировании SQL?"
      options:
        - "Параметризованные запросы работают быстрее"
        - "Они разделяют код SQL-запроса и данные, не позволяя пользовательскому вводу изменить структуру запроса"
        - "Конкатенация строк запрещена стандартом SQL"
        - "Параметризованные запросы автоматически шифруют данные в базе"
      correct_answer: "Они разделяют код SQL-запроса и данные, не позволяя пользовательскому вводу изменить структуру запроса"
