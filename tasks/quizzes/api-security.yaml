title: "Безопасность API (OWASP API Security Top 10)"
description: |
  Тест на знание безопасности API по классификации OWASP API Security Top 10.
  Проверяет понимание BOLA, mass assignment, уязвимостей JWT, IDOR и других ключевых рисков API.
type: quiz
order: 22
config:
  difficulty: high
  tags: [api, owasp-top-10, web]
  max_points: 200
  questions:
    - id: 1
      text: "Что такое BOLA (Broken Object Level Authorization) и почему это уязвимость №1 в OWASP API Security Top 10?"
      options:
        - "Ошибка в шифровании данных при передаче между микросервисами"
        - "Отсутствие проверки авторизации при доступе к объектам по идентификатору, позволяющее пользователю получить доступ к чужим данным"
        - "Уязвимость, связанная с отсутствием rate limiting на API-эндпоинтах"
        - "Ошибка в конфигурации CORS, позволяющая любому домену делать запросы к API"
      correct_answer: "Отсутствие проверки авторизации при доступе к объектам по идентификатору, позволяющее пользователю получить доступ к чужим данным"

    - id: 2
      text: "Что такое уязвимость mass assignment в API?"
      options:
        - "Одновременное подключение слишком большого числа пользователей к API"
        - "Возможность изменить защищённые поля объекта (например, `role` или `isAdmin`), передав их в теле запроса, если сервер автоматически привязывает все поля"
        - "Атака с массовой отправкой запросов для перегрузки сервера"
        - "Ошибка в маршрутизации, при которой запрос попадает не на тот эндпоинт"
      correct_answer: "Возможность изменить защищённые поля объекта (например, `role` или `isAdmin`), передав их в теле запроса, если сервер автоматически привязывает все поля"

    - id: 3
      text: "Какая уязвимость JWT-токенов возникает при использовании алгоритма `\"alg\": \"none\"`?"
      options:
        - "Токен становится слишком большим и не помещается в заголовок"
        - "Сервер принимает токен без проверки подписи, позволяя злоумышленнику подделать любой токен"
        - "Токен автоматически истекает через 1 секунду"
        - "Алгоритм `none` шифрует токен с пустым ключом, что делает его нечитаемым"
      correct_answer: "Сервер принимает токен без проверки подписи, позволяя злоумышленнику подделать любой токен"

    - id: 4
      text: "Почему отсутствие rate limiting является серьёзной проблемой безопасности API?"
      options:
        - "Без rate limiting API работает медленнее из-за лишних проверок"
        - "Это позволяет атакующему перебирать пароли, извлекать данные массово и проводить DDoS-атаки на отдельные эндпоинты"
        - "Rate limiting нужен только для платных API-тарифов"
        - "Без rate limiting невозможно использовать протокол HTTPS"
      correct_answer: "Это позволяет атакующему перебирать пароли, извлекать данные массово и проводить DDoS-атаки на отдельные эндпоинты"

    - id: 5
      text: "Что такое IDOR (Insecure Direct Object Reference) в контексте API?"
      options:
        - "Использование устаревшей версии API без поддержки шифрования"
        - "Прямой доступ к внутренним объектам по предсказуемому идентификатору (например, `/api/users/123`) без проверки прав доступа"
        - "Ошибка в сериализации JSON-ответов API"
        - "Перенаправление API-запросов через небезопасный прокси"
      correct_answer: "Прямой доступ к внутренним объектам по предсказуемому идентификатору (например, `/api/users/123`) без проверки прав доступа"
