title: "Секреты в коде и управление секретами"
description: |
  Тест на знание рисков, связанных с секретами в коде, и методов безопасного управления ими.
  Проверяет понимание инструментов обнаружения секретов, безопасного хранения и реагирования на утечки.
type: quiz
order: 16
config:
  difficulty: low
  tags: [secrets, appsec, devsecops]
  max_points: 100
  questions:
    - id: 1
      text: "Какой основной риск хранения секретов (API-ключей, паролей) непосредственно в исходном коде?"
      options:
        - "Секреты замедляют компиляцию проекта"
        - "Они попадают в систему контроля версий и могут быть доступны всем, кто имеет доступ к репозиторию"
        - "Жёстко закодированные секреты работают медленнее, чем переменные окружения"
        - "Это запрещено синтаксисом большинства языков программирования"
      correct_answer: "Они попадают в систему контроля версий и могут быть доступны всем, кто имеет доступ к репозиторию"

    - id: 2
      text: "Чем инструмент `git-secrets` отличается от использования `.gitignore` для защиты секретов?"
      options:
        - "`.gitignore` и `git-secrets` выполняют одну и ту же функцию"
        - "`.gitignore` исключает файлы из коммита, а `git-secrets` сканирует содержимое коммитов на наличие паттернов секретов и блокирует их"
        - "`git-secrets` удаляет секреты из истории Git, а `.gitignore` — нет"
        - "`.gitignore` работает только на GitHub, а `git-secrets` — только локально"
      correct_answer: "`.gitignore` исключает файлы из коммита, а `git-secrets` сканирует содержимое коммитов на наличие паттернов секретов и блокирует их"

    - id: 3
      text: "Какой из перечисленных инструментов предназначен для обнаружения секретов в Git-репозиториях?"
      options:
        - "ESLint"
        - "`gitleaks`"
        - "Prettier"
        - "Webpack"
      correct_answer: "`gitleaks`"

    - id: 4
      text: "Какое преимущество систем управления секретами (HashiCorp Vault, AWS Secrets Manager) перед переменными окружения?"
      options:
        - "Переменные окружения невозможно использовать в контейнерах"
        - "Vault-системы обеспечивают централизованное управление, аудит доступа, автоматическую ротацию и шифрование секретов"
        - "Переменные окружения не поддерживаются в Linux"
        - "Vault-системы бесплатны, а переменные окружения — платные"
      correct_answer: "Vault-системы обеспечивают централизованное управление, аудит доступа, автоматическую ротацию и шифрование секретов"

    - id: 5
      text: "Что необходимо сделать в первую очередь, если секрет (например, API-ключ) случайно попал в Git-коммит?"
      options:
        - "Удалить файл с секретом и сделать новый коммит"
        - "Немедленно отозвать (revoke) скомпрометированный секрет и выпустить новый"
        - "Откатить коммит с помощью `git revert` и считать проблему решённой"
        - "Добавить файл в `.gitignore`, чтобы он больше не отслеживался"
      correct_answer: "Немедленно отозвать (revoke) скомпрометированный секрет и выпустить новый"
