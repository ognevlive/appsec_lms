title: "Semgrep: Написание кастомных правил"
description: |
  Кастомные правила Semgrep позволяют детектировать уязвимости
  специфичные для вашего стека и паттернов разработки.
  Разберём синтаксис, metavariables и операторы.
type: quiz
order: 34
config:
  difficulty: high
  tags: [sast, semgrep, custom-rules, taint, appsec]
  max_points: 200
  questions:
    - id: 1
      text: "Что обозначает `$X` в правиле Semgrep?"
      options:
        - "Metavariable — переменная, которая совпадает с любым выражением"
        - "Переменная типа string"
        - "Ссылка на внешний файл правил"
        - "Комментарий в правиле"
      correct_answer: "Metavariable — переменная, которая совпадает с любым выражением"

    - id: 2
      text: "Для чего используется `pattern-not` в правиле Semgrep?"
      options:
        - "Исключить код, совпадающий с паттерном, из результатов"
        - "Найти код, который НЕ содержит данный паттерн"
        - "Инвертировать всё правило"
        - "Исключить целые файлы из сканирования"
      correct_answer: "Исключить код, совпадающий с паттерном, из результатов"

    - id: 3
      text: "Что нужно указать в правиле Semgrep для taint-анализа?"
      options:
        - "`mode: taint` с полями `sources`, `sinks` и опционально `sanitizers`"
        - "`type: dataflow` с полями `input` и `output`"
        - "`analysis: taint` с полями `from` и `to`"
        - "Только паттерн sink — source определяется автоматически"
      correct_answer: "`mode: taint` с полями `sources`, `sinks` и опционально `sanitizers`"

    - id: 4
      text: "Что делает `pattern-inside` в правиле Semgrep?"
      options:
        - "Совпадение только если код находится внутри указанного блока (функции, класса и т.д.)"
        - "Поиск паттерна внутри строковых литералов"
        - "Ограничение поиска одним файлом"
        - "Анализ только импортированных модулей"
      correct_answer: "Совпадение только если код находится внутри указанного блока (функции, класса и т.д.)"

    - id: 5
      text: "В SARIF-выводе Semgrep что означает поле `level: error`?"
      options:
        - "Severity правила — определяет как CI/CD обрабатывает результат"
        - "Ошибка парсинга исходного файла"
        - "Критическая ошибка самого Semgrep"
        - "Уязвимость класса критической (CVSS 9+)"
      correct_answer: "Severity правила — определяет как CI/CD обрабатывает результат"
