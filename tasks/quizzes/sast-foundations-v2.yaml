title: "Основы статического анализа и поиска секретов"
description: |
  Статический анализ безопасности (SAST) и поиск секретов в коде —
  фундаментальные практики DevSecOps. Понимание угроз, реальных инцидентов
  и ключевых концепций необходимо перед работой с инструментами.
type: quiz
order: 30
config:
  difficulty: low
  tags: [sast, secrets, devsecops, appsec, foundations]
  max_points: 100
  questions:
    - id: 1
      text: "В 2022 году Samsung случайно опубликовал исходный код Galaxy с секретами. Где были найдены утечки?"
      options:
        - "В публичных GitHub-репозиториях сотрудников"
        - "В официальном Docker Hub образе"
        - "В публичном S3-бакете"
        - "В ответах API production-сервера"
      correct_answer: "В публичных GitHub-репозиториях сотрудников"

    - id: 2
      text: "Что такое SAST (Static Application Security Testing)?"
      options:
        - "Анализ исходного кода или бинарников без запуска приложения"
        - "Тестирование запущенного приложения через HTTP-запросы"
        - "Сканирование сети на открытые порты"
        - "Фаззинг входных данных в работающем сервисе"
      correct_answer: "Анализ исходного кода или бинарников без запуска приложения"

    - id: 3
      text: "В чём ключевое отличие SAST от DAST?"
      options:
        - "SAST анализирует код без запуска, DAST тестирует работающее приложение"
        - "SAST быстрее, DAST точнее"
        - "SAST для backend, DAST для frontend"
        - "SAST использует ИИ, DAST — сигнатуры"
      correct_answer: "SAST анализирует код без запуска, DAST тестирует работающее приложение"

    - id: 4
      text: "Секрет был закоммичен, а затем удалён в следующем коммите. Является ли репозиторий безопасным?"
      options:
        - "Нет — секрет остаётся в истории git и доступен через `git log`"
        - "Да — после удаления секрет недоступен"
        - "Зависит от видимости репозитория (public/private)"
        - "Да, если сделать `force push`"
      correct_answer: "Нет — секрет остаётся в истории git и доступен через `git log`"

    - id: 5
      text: "Что такое SCA (Software Composition Analysis)?"
      options:
        - "Анализ сторонних зависимостей на известные уязвимости"
        - "Анализ архитектуры микросервисов"
        - "Статический анализ кода собственной разработки"
        - "Анализ конфигурации облачной инфраструктуры"
      correct_answer: "Анализ сторонних зависимостей на известные уязвимости"
