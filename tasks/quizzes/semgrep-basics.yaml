title: "Semgrep: Принципы работы и первый запуск"
description: |
  Semgrep — мощный инструмент SAST, работающий на основе
  абстрактных синтаксических деревьев (AST). Понимание его
  архитектуры критично для правильного использования и триажа результатов.
type: quiz
order: 33
config:
  difficulty: medium
  tags: [sast, semgrep, ast, taint-analysis, appsec]
  max_points: 150
  questions:
    - id: 1
      text: "На чём основан анализ кода в Semgrep?"
      options:
        - "Абстрактное синтаксическое дерево (AST)"
        - "Регулярные выражения по тексту файла"
        - "Control Flow Graph (CFG)"
        - "Байткод скомпилированного приложения"
      correct_answer: "Абстрактное синтаксическое дерево (AST)"

    - id: 2
      text: "Что такое taint analysis в контексте SAST?"
      options:
        - "Отслеживание пути данных от пользовательского ввода (source) до опасной функции (sink)"
        - "Анализ памяти на утечки в C/C++ коде"
        - "Проверка корректности типов данных"
        - "Поиск SQL-запросов без параметризации"
      correct_answer: "Отслеживание пути данных от пользовательского ввода (source) до опасной функции (sink)"

    - id: 3
      text: "Что означает false negative в контексте SAST?"
      options:
        - "Реальная уязвимость, которую инструмент не обнаружил"
        - "Ложное срабатывание на безопасный код"
        - "Ошибка парсинга файла инструментом"
        - "Уязвимость в самом инструменте SAST"
      correct_answer: "Реальная уязвимость, которую инструмент не обнаружил"

    - id: 4
      text: "Что делает команда `semgrep --config=auto`?"
      options:
        - "Автоматически выбирает подходящие правила из реестра по языкам в репозитории"
        - "Запускает все доступные правила Semgrep"
        - "Генерирует конфигурационный файл для проекта"
        - "Запускает в режиме автоисправления найденных проблем"
      correct_answer: "Автоматически выбирает подходящие правила из реестра по языкам в репозитории"

    - id: 5
      text: "Почему SAST инструменты не могут заменить ручной code review полностью?"
      options:
        - "Они не понимают бизнес-логику и контекст, что приводит к false positives и false negatives"
        - "Они работают слишком медленно для больших проектов"
        - "Они не поддерживают все языки программирования"
        - "Они требуют запуска приложения"
      correct_answer: "Они не понимают бизнес-логику и контекст, что приводит к false positives и false negatives"
