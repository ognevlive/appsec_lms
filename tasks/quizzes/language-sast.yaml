title: "Language-Specific SAST: Bandit и CodeQL"
description: |
  Универсальные инструменты как `semgrep` не всегда достаточны.
  `bandit` и CodeQL предлагают глубокий анализ специфичный
  для языка с использованием CFG и dataflow-анализа.
type: quiz
order: 35
config:
  difficulty: medium
  tags: [sast, bandit, codeql, python, appsec]
  max_points: 150
  questions:
    - id: 1
      text: "Что такое Bandit и для каких языков он предназначен?"
      options:
        - "SAST-инструмент для Python, анализирует AST в поисках типичных ошибок безопасности"
        - "Универсальный SAST для любых языков от OpenSource"
        - "Fuzzer для Python-приложений"
        - "Инструмент для анализа Python-зависимостей"
      correct_answer: "SAST-инструмент для Python, анализирует AST в поисках типичных ошибок безопасности"

    - id: 2
      text: "Bandit нашёл `B602: subprocess_popen_with_shell_equals_true` — что это значит?"
      options:
        - "Вызов `subprocess` с `shell=True` — возможна инъекция команд через входные данные"
        - "Использование устаревшего API subprocess"
        - "`subprocess` запускается с правами root"
        - "Отсутствие обработки исключений в subprocess"
      correct_answer: "Вызов `subprocess` с `shell=True` — возможна инъекция команд через входные данные"

    - id: 3
      text: "В чём принципиальное отличие CodeQL от Semgrep?"
      options:
        - "CodeQL строит полную семантическую модель кода с dataflow, Semgrep работает на уровне синтаксиса"
        - "CodeQL быстрее, Semgrep точнее"
        - "CodeQL поддерживает только Java, Semgrep — все языки"
        - "CodeQL требует runtime, Semgrep — нет"
      correct_answer: "CodeQL строит полную семантическую модель кода с dataflow, Semgrep работает на уровне синтаксиса"

    - id: 4
      text: "Что нужно сделать перед запуском CodeQL-запросов против проекта?"
      options:
        - "Создать CodeQL database командой `codeql database create`"
        - "Скомпилировать проект в специальный формат `.cql`"
        - "Загрузить проект на GitHub"
        - "Установить зависимости через `codeql install`"
      correct_answer: "Создать CodeQL database командой `codeql database create`"

    - id: 5
      text: "Bandit возвращает severity и confidence. Какая комбинация требует немедленного внимания?"
      options:
        - "HIGH severity + HIGH confidence"
        - "LOW severity + HIGH confidence"
        - "HIGH severity + LOW confidence"
        - "MEDIUM severity + MEDIUM confidence"
      correct_answer: "HIGH severity + HIGH confidence"
