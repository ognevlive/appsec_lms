title: "Secrets Detection: Кастомизация и продвинутые техники"
description: |
  Дефолтные правила охватывают стандартные форматы токенов, но
  каждая организация имеет собственные паттерны. Разберём написание
  кастомных правил, allowlists и настройку чувствительности.
type: quiz
order: 32
config:
  difficulty: medium
  tags: [secrets, gitleaks, custom-rules, ci-cd, devsecops]
  max_points: 150
  questions:
    - id: 1
      text: "В каком файле настраиваются кастомные правила для Gitleaks?"
      options:
        - "`.gitleaks.toml`"
        - "`.gitleaksrc`"
        - "`gitleaks-config.yaml`"
        - "`.secrets.toml`"
      correct_answer: "`.gitleaks.toml`"

    - id: 2
      text: "Как называется механизм в Gitleaks для исключения конкретных путей или файлов из сканирования?"
      options:
        - "`allowlist`"
        - "`exclude`"
        - "`ignore`"
        - "`whitelist`"
      correct_answer: "`allowlist`"

    - id: 3
      text: "Секрет хранится как `cGFzc3dvcmQ6c2VjcmV0MTIz` в коде. Что это?"
      options:
        - "Base64-encoded строка (`password:secret123`)"
        - "SHA256-хэш пароля"
        - "Hex-encoded строка"
        - "JWT-токен без подписи"
      correct_answer: "Base64-encoded строка (`password:secret123`)"

    - id: 4
      text: "Что такое 'split secret' как техника обхода сканеров?"
      options:
        - "Секрет разбит на части в нескольких переменных и конкатенируется в рантайме"
        - "Секрет зашифрован двумя разными ключами"
        - "Секрет хранится в двух разных файлах конфигурации"
        - "Секрет передаётся через два разных API"
      correct_answer: "Секрет разбит на части в нескольких переменных и конкатенируется в рантайме"

    - id: 5
      text: "При интеграции Gitleaks в CI/CD какой exit code означает нахождение утечек?"
      options:
        - "`1`"
        - "`0`"
        - "`2`"
        - "`255`"
      correct_answer: "`1`"
