title: "SAST: Основы статического анализа безопасности"
description: |
  Тест на знание основ статического анализа безопасности приложений (SAST).
  Проверяет понимание принципов работы SAST, отличий от DAST, инструментов и места в CI/CD.
type: quiz
order: 7
config:
  difficulty: medium
  tags: [sast, appsec, devsecops]
  max_points: 150
  questions:
    - id: 1
      text: "Что такое SAST (Static Application Security Testing)?"
      options:
        - "Метод тестирования безопасности путём отправки HTTP-запросов к работающему приложению"
        - "Метод анализа исходного кода или скомпилированного бинарного файла без запуска приложения"
        - "Процесс ручного код-ревью с участием команды безопасности"
        - "Инструмент для мониторинга сетевого трафика в production-среде"
      correct_answer: "Метод анализа исходного кода или скомпилированного бинарного файла без запуска приложения"

    - id: 2
      text: "Чем SAST принципиально отличается от DAST?"
      options:
        - "SAST анализирует код без его выполнения (white-box), а DAST тестирует работающее приложение извне (black-box)"
        - "SAST работает только с Python, а DAST — только с Java"
        - "SAST находит уязвимости в production, а DAST — на этапе разработки"
        - "SAST является платным инструментом, а DAST — всегда бесплатным"
      correct_answer: "SAST анализирует код без его выполнения (white-box), а DAST тестирует работающее приложение извне (black-box)"

    - id: 3
      text: "Какой из перечисленных инструментов является SAST-решением для анализа Python-кода?"
      options:
        - "OWASP ZAP"
        - "Burp Suite"
        - "Bandit"
        - "Nmap"
      correct_answer: "Bandit"

    - id: 4
      text: "Что такое taint analysis (анализ помеченных данных) в контексте SAST?"
      options:
        - "Метод шифрования конфиденциальных данных в исходном коде"
        - "Отслеживание потока данных от недоверенных источников (source) до потенциально опасных функций (sink)"
        - "Техника обфускации кода для защиты от реверс-инжиниринга"
        - "Процесс удаления устаревших зависимостей из проекта"
      correct_answer: "Отслеживание потока данных от недоверенных источников (source) до потенциально опасных функций (sink)"

    - id: 5
      text: "Какая основная проблема SAST-инструментов, снижающая доверие разработчиков к результатам?"
      options:
        - "Невозможность работы с современными языками программирования"
        - "Высокий процент ложноположительных срабатываний (false positives)"
        - "Необходимость запуска только в production-окружении"
        - "Обязательное наличие root-прав на сервере для работы"
      correct_answer: "Высокий процент ложноположительных срабатываний (false positives)"
