title: "Secrets Detection: Принципы работы сканеров"
description: |
  Понимание того, как работают инструменты поиска секретов, помогает
  правильно их настраивать и интерпретировать результаты.
  Разберём ключевые механизмы: regex, entropy, baseline.
type: quiz
order: 31
config:
  difficulty: low
  tags: [secrets, gitleaks, trufflehog, detection, devsecops]
  max_points: 100
  questions:
    - id: 1
      text: "Какой основной метод обнаружения секретов использует Gitleaks по умолчанию?"
      options:
        - "Регулярные выражения (regex) для известных форматов токенов"
        - "Машинное обучение на основе обучающей выборки"
        - "Только энтропийный анализ"
        - "Сравнение с базой данных утёкших секретов"
      correct_answer: "Регулярные выражения (regex) для известных форматов токенов"

    - id: 2
      text: "Что такое энтропия Шеннона в контексте поиска секретов?"
      options:
        - "Мера случайности строки — высокая энтропия указывает на возможный ключ/токен"
        - "Количество символов в строке"
        - "Скорость работы алгоритма сканирования"
        - "Уровень сжатия секрета при хранении"
      correct_answer: "Мера случайности строки — высокая энтропия указывает на возможный ключ/токен"

    - id: 3
      text: "Что такое false positive в контексте secrets scanning?"
      options:
        - "Срабатывание на строку, которая не является реальным секретом (например, тестовые данные)"
        - "Реальный секрет, который не был обнаружен сканером"
        - "Ошибка в конфигурации инструмента"
        - "Секрет, истёкший по времени"
      correct_answer: "Срабатывание на строку, которая не является реальным секретом (например, тестовые данные)"

    - id: 4
      text: "Для чего используется baseline в `detect-secrets`?"
      options:
        - "Для фиксации известных существующих секретов, чтобы не блокировать коммиты из-за них"
        - "Для хранения реальных значений секретов"
        - "Для настройки чувствительности энтропийного анализа"
        - "Для синхронизации правил между командами"
      correct_answer: "Для фиксации известных существующих секретов, чтобы не блокировать коммиты из-за них"

    - id: 5
      text: "Trufflehog поддерживает флаг `--only-verified`. Что он делает?"
      options:
        - "Возвращает только секреты, которые были проверены как активные через API"
        - "Проверяет только последний коммит"
        - "Запускает верификацию подписи Git-коммитов"
        - "Ограничивает сканирование файлами с расширением `.env`"
      correct_answer: "Возвращает только секреты, которые были проверены как активные через API"
