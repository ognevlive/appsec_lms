title: "Supply Chain Security: Зависимости и SCA"
description: |
  Атаки на цепочку поставок программного обеспечения становятся
  всё более опасными. Log4Shell показал, что одна уязвимость в
  зависимости может затронуть миллионы систем. Разберём инструменты и подходы.
type: quiz
order: 36
config:
  difficulty: medium
  tags: [supply-chain, sca, trivy, cve, devsecops, sbom]
  max_points: 150
  questions:
    - id: 1
      text: "Log4Shell (CVE-2021-44228) был уязвимостью в Log4j 2. Почему она была настолько критична?"
      options:
        - "Log4j использовался в тысячах приложений; уязвимость позволяла RCE через строку в логе"
        - "Log4j был частью JDK и поставлялся с Java"
        - "Уязвимость позволяла обходить аутентификацию"
        - "Log4j использовался только в Apache продуктах"
      correct_answer: "Log4j использовался в тысячах приложений; уязвимость позволяла RCE через строку в логе"

    - id: 2
      text: "Что такое CVSS score?"
      options:
        - "Стандартизированная числовая оценка серьёзности уязвимости от 0 до 10"
        - "Количество затронутых систем в мире"
        - "Рейтинг репутации пакета в реестре"
        - "Время с момента публикации CVE"
      correct_answer: "Стандартизированная числовая оценка серьёзности уязвимости от 0 до 10"

    - id: 3
      text: "Что такое SBOM (Software Bill of Materials)?"
      options:
        - "Полный список компонентов, зависимостей и их версий в программном продукте"
        - "Список всех CVE применимых к проекту"
        - "Реестр лицензий используемых библиотек"
        - "Документация API внешних зависимостей"
      correct_answer: "Полный список компонентов, зависимостей и их версий в программном продукте"

    - id: 4
      text: "Trivy может сканировать несколько типов артефактов. Какой из следующих НЕ поддерживается?"
      options:
        - "Исходный код на уровне синтаксиса (SAST)"
        - "Docker/OCI образы"
        - "Файловая система"
        - "IaC конфигурации (Terraform, Kubernetes)"
      correct_answer: "Исходный код на уровне синтаксиса (SAST)"

    - id: 5
      text: "В чём разница между `pip-audit` и OWASP Dependency-Check для Python проектов?"
      options:
        - "`pip-audit` проверяет PyPI Advisory Database, Dependency-Check использует NVD и поддерживает множество языков"
        - "`pip-audit` быстрее, Dependency-Check точнее"
        - "`pip-audit` проверяет только прямые зависимости, Dependency-Check — транзитивные"
        - "Они идентичны по функциональности"
      correct_answer: "`pip-audit` проверяет PyPI Advisory Database, Dependency-Check использует NVD и поддерживает множество языков"
