title: "Безопасность зависимостей и цепочки поставок"
description: |
  Тест на знание безопасности зависимостей и цепочки поставок ПО.
  Проверяет понимание SCA, CVE, SBOM, инструментов анализа и типичных атак на зависимости.
type: quiz
order: 13
config:
  difficulty: medium
  tags: [sca, supply-chain, dependencies]
  max_points: 150
  questions:
    - id: 1
      text: "Что такое SCA (Software Composition Analysis)?"
      options:
        - "Метод статического анализа собственного исходного кода на уязвимости"
        - "Процесс анализа сторонних компонентов и зависимостей проекта на известные уязвимости и лицензионные риски"
        - "Техника динамического тестирования веб-приложений"
        - "Способ шифрования конфигурационных файлов"
      correct_answer: "Процесс анализа сторонних компонентов и зависимостей проекта на известные уязвимости и лицензионные риски"

    - id: 2
      text: "Что представляет собой идентификатор CVE?"
      options:
        - "Внутренний номер тикета в системе баг-трекинга"
        - "Стандартизированный идентификатор публично известной уязвимости в формате `CVE-YYYY-NNNNN`"
        - "Уровень критичности уязвимости по шкале от 1 до 10"
        - "Название инструмента для сканирования зависимостей"
      correct_answer: "Стандартизированный идентификатор публично известной уязвимости в формате `CVE-YYYY-NNNNN`"

    - id: 3
      text: "Что такое SBOM (Software Bill of Materials)?"
      options:
        - "Лицензионное соглашение для коммерческого ПО"
        - "Полный перечень всех компонентов, библиотек и зависимостей, из которых состоит программный продукт"
        - "Документация по API сторонних сервисов"
        - "Список серверов, на которых развёрнуто приложение"
      correct_answer: "Полный перечень всех компонентов, библиотек и зависимостей, из которых состоит программный продукт"

    - id: 4
      text: "Что такое атака typosquatting в контексте менеджеров пакетов?"
      options:
        - "Атака, при которой злоумышленник взламывает официальный репозиторий пакетов"
        - "Публикация вредоносного пакета с именем, похожим на популярную библиотеку (например, `lodas` вместо `lodash`)"
        - "Подмена DNS-записей для перенаправления трафика"
        - "Внедрение вредоносного кода в процессе компиляции"
      correct_answer: "Публикация вредоносного пакета с именем, похожим на популярную библиотеку (например, `lodas` вместо `lodash`)"

    - id: 5
      text: "Почему lock-файлы (`package-lock.json`, `yarn.lock`, `Pipfile.lock`) важны для безопасности?"
      options:
        - "Они шифруют исходный код зависимостей"
        - "Они фиксируют точные версии всех зависимостей, предотвращая неожиданную установку новых и потенциально скомпрометированных версий"
        - "Они заменяют необходимость в SCA-инструментах"
        - "Они автоматически обновляют зависимости до последних версий"
      correct_answer: "Они фиксируют точные версии всех зависимостей, предотвращая неожиданную установку новых и потенциально скомпрометированных версий"
